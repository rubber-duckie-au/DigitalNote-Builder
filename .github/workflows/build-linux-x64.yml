# DigitalNote-2 Linux x64 CI
# Builds both the Qt wallet (app) and daemon on every push and pull request.
#
# HOW TO PUBLISH THE PRE-BUILT Qt ARTIFACT (do this once locally on Linux)
# ---------------------------------------------------------------
# 1. Build Qt locally:
#      cd DigitalNote-Builder/linux/x64
#      ../../compile/qt.sh "-bundled-xcb-xinput -fontconfig -system-freetype" "-j 4"
#
# 2. Archive:
#      cd DigitalNote-Builder/linux/x64
#      tar -czf qt-5.15.7-static-linux-x64.tar.gz libs/qt-5.15.7/
#
# 3. GitHub: DigitalNote-Builder repo -> Releases -> Draft a new release
#      Tag:    qt-static-5.15.7-linux-x64
#      Title:  Qt 5.15.7 static Linux x64
#      Upload: qt-5.15.7-static-linux-x64.tar.gz
#      Publish the release
#
# 4. Paste the direct asset URL into QT_RELEASE_URL below.
# ---------------------------------------------------------------
#
# Key differences from Windows build:
#   berkeleydb:  "build_unix" not "build_windows", no "--enable-mingw"
#   openssl:     "linux-x86_64" not "mingw64"
#   qt:          "-bundled-xcb-xinput -fontconfig -system-freetype" not "-platform win32-g++"
#   gmp:         installed via apt (libgmp-dev), not pacman
#   secp256k1:   bundled in DigitalNote-2/src/secp256k1/
#   leveldb:     bundled in DigitalNote-2/src/leveldb/
#   mnemonic:    git submodule in DigitalNote-2/src/bip39/
#
# Script argument mapping (same as Windows):
#   berkeleydb.sh  $1=build_dir  $2=configure_flags  $3=make_jobs
#   boost.sh       $1=combined "address-model=64 toolset=gcc -j N" string
#   gmp.sh         no args (uses system package — checks /usr/lib/libgmp.a)
#   libevent.sh    $1=configure_extra  $2=make_jobs
#   miniupnpc.sh   $1=libname  $2=make_jobs
#   openssl.sh     $1=platform  $2=make_jobs
#   qrencode.sh    $1=configure_extra  $2=make_jobs
#   secp256k1.sh   $1=configure_extra  $2=make_jobs
#   leveldb.sh     $1=make_jobs
#   qt.sh          $1=platform_flags  $2=make_jobs
#   mnemonic.sh    $1=unused  $2=make_jobs (uses cmake internally)

name: Build Linux x64

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

env:
  QT_RELEASE_URL: https://github.com/rubber-duckie-au/DigitalNote-Builder/releases/download/qt-static-5.15.7-linux-x64/qt-5.15.7-static-linux-x64.tar.gz

jobs:
  build:
    name: Linux x64 (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout DigitalNote-Builder
        uses: actions/checkout@v4
        with:
          repository: rubber-duckie-au/DigitalNote-Builder
          token: ${{ secrets.PAT_TOKEN }}

      - name: Checkout DigitalNote-2
        uses: actions/checkout@v4
        with:
          repository: rubber-duckie-au/DigitalNote-2
          path: DigitalNote-2-src
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      # ── 2. Build directory layout ─────────────────────────────────────────────
      # Scripts assume CWD = linux/x64/ with:
      #   DigitalNote-2/  = linux/x64/DigitalNote-2/
      #   libs/           = linux/x64/libs/
      #   temp/           = linux/x64/temp/
      #   download/       = ../../../download/ (= Builder root download/)
      - name: Set up build directory layout
        run: |
          mkdir -p $HOME/build/DigitalNote-Builder
          mkdir -p $HOME/build/download
          mkdir -p $HOME/build/artifacts

          cp -r . $HOME/build/DigitalNote-Builder/
          cp -r DigitalNote-2-src/. $HOME/build/DigitalNote-Builder/linux/x64/DigitalNote-2/

          mkdir -p $HOME/build/DigitalNote-Builder/linux/x64/temp
          mkdir -p $HOME/build/DigitalNote-Builder/linux/x64/libs

          # Symlink download dir where scripts expect it (../../../download from temp/)
          ln -sf $HOME/build/download $HOME/build/DigitalNote-Builder/download

      # ── 3. System dependencies ────────────────────────────────────────────────
      # Matches linux/x64/update.sh plus extras needed for cmake (mnemonic)
      # and libgmp-dev (used instead of pacman on Linux)
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc g++ make autoconf libtool \
            cmake \
            libgmp-dev \
            libfreetype6-dev libfreetype-dev \
            libfontconfig1-dev \
            libx11-dev libx11-xcb-dev \
            libxext-dev libxfixes-dev libxi-dev libxrender-dev \
            libxcb1-dev libxcb-glx0-dev libxcb-keysyms1-dev \
            libxcb-image0-dev libxcb-shm0-dev libxcb-icccm4-dev \
            libxcb-sync-dev libxcb-xfixes0-dev libxcb-shape0-dev \
            libxcb-randr0-dev libxcb-render-util0-dev \
            libxcb-xinerama0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            wget curl perl bzip2 python3

      # ── 4. Qt — cached then downloaded from GitHub Release ───────────────────
      - name: Cache Qt 5.15.7 static build
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ${{ env.HOME }}/build/DigitalNote-Builder/linux/x64/libs/qt-5.15.7
          key: qt-5.15.7-static-linux-x64-${{ hashFiles('compile/qt.sh') }}

      - name: Download pre-built Qt 5.15.7 from GitHub Release
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          echo "Downloading pre-built Qt 5.15.7 static for Linux..."
          curl -L -o /tmp/qt-prebuilt.tar.gz "$QT_RELEASE_URL"
          echo "Extracting..."
          tar -xzf /tmp/qt-prebuilt.tar.gz \
              -C $HOME/build/DigitalNote-Builder/linux/x64/
          rm /tmp/qt-prebuilt.tar.gz
          echo "Qt ready:"
          ls $HOME/build/DigitalNote-Builder/linux/x64/libs/qt-5.15.7/bin/

      # ── 5. Source archive downloads ───────────────────────────────────────────
      - name: Cache source archives
        id: cache-downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.HOME }}/build/download
          key: source-archives-linux-v1

      - name: Download source archives
        if: steps.cache-downloads.outputs.cache-hit != 'true'
        run: |
          cd $HOME/build/download

          echo "=== Boost 1.80.0 ==="
          wget -q https://archives.boost.io/release/1.80.0/source/boost_1_80_0.tar.gz

          echo "=== OpenSSL 1.1.1w ==="
          wget -q https://github.com/openssl/openssl/releases/download/OpenSSL_1_1_1w/openssl-1.1.1w.tar.gz

          echo "=== BerkeleyDB 6.2.32.NC ==="
          wget -q http://download.oracle.com/berkeley-db/db-6.2.32.NC.tar.gz

          echo "=== libevent 2.1.12-stable ==="
          wget -q https://github.com/libevent/libevent/releases/download/release-2.1.12-stable/libevent-2.1.12-stable.tar.gz

          echo "=== miniupnpc 2.2.8 ==="
          wget -q "http://miniupnp.free.fr/files/download.php?file=miniupnpc-2.2.8.tar.gz" \
            -O miniupnpc-2.2.8.tar.gz

          # qrencode: script does: tar xvfz .../v4.1.1.tar.gz — exact filename required
          echo "=== qrencode 4.1.1 ==="
          wget -q https://github.com/fukuchi/libqrencode/archive/refs/tags/v4.1.1.tar.gz

          echo "=== Downloads complete ==="
          ls -lh $HOME/build/download/

      # ── 6. Compiled libraries ─────────────────────────────────────────────────
      - name: Cache compiled libraries
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.HOME }}/build/DigitalNote-Builder/linux/x64/libs/db-6.2.32.NC
            ${{ env.HOME }}/build/DigitalNote-Builder/linux/x64/libs/boost_1_80_0
            ${{ env.HOME }}/build/DigitalNote-Builder/linux/x64/libs/openssl-1.1.1w
            ${{ env.HOME }}/build/DigitalNote-Builder/linux/x64/libs/libevent-2.1.12-stable
            ${{ env.HOME }}/build/DigitalNote-Builder/linux/x64/libs/miniupnpc-2.2.8
            ${{ env.HOME }}/build/DigitalNote-Builder/linux/x64/libs/qrencode-4.1.1
            ${{ env.HOME }}/build/DigitalNote-Builder/linux/x64/libs/mnemonic
          key: libs-linux-x64-v1-${{ hashFiles(
            'linux/x64/compile_libs.sh',
            'compile/berkeleydb.sh',
            'compile/boost.sh',
            'compile/gmp.sh',
            'compile/libevent.sh',
            'compile/miniupnpc.sh',
            'compile/openssl.sh',
            'compile/qrencode.sh',
            'compile/secp256k1.sh',
            'compile/mnemonic.sh'
          ) }}

      - name: Build support libraries
        if: steps.cache-libs.outputs.cache-hit != 'true'
        working-directory: ${{ env.HOME }}/build/DigitalNote-Builder/linux/x64
        run: |
          JOBS=$(nproc)

          # ── BerkeleyDB 6.2.32.NC ──────────────────────────────────────────────
          # Args: $1=build_dir  $2=configure_flags  $3=make_jobs
          # Linux uses "build_unix" not "build_windows", no --enable-mingw
          echo "=== BerkeleyDB ==="
          ../../compile/berkeleydb.sh "build_unix" "" "-j $JOBS"

          # ── Boost 1.80.0 ──────────────────────────────────────────────────────
          # Args: $1=combined string
          echo "=== Boost ==="
          ../../compile/boost.sh "address-model=64 toolset=gcc -j $JOBS"

          # ── GMP ───────────────────────────────────────────────────────────────
          # On Linux: installed via apt (libgmp-dev), gmp.sh checks for the file
          # The gmp.sh script checks /mingw64/lib/libgmp.a (Windows path) —
          # on Linux we verify the apt package is present instead
          echo "=== GMP (system package) ==="
          dpkg -l libgmp-dev | grep -q "^ii" && echo "GMP ready via apt" || \
            (sudo apt-get install -y libgmp-dev && echo "GMP installed")

          # ── libevent 2.1.12 ───────────────────────────────────────────────────
          # Args: $1=configure_extra  $2=make_jobs
          echo "=== libevent ==="
          ../../compile/libevent.sh "" "-j $JOBS"

          # ── miniupnpc 2.2.8 ───────────────────────────────────────────────────
          # Linux: uses Makefile (not Makefile.mingw)
          # miniupnpc.sh uses Makefile.mingw — on Linux we need the standard make
          # Override: build directly then install manually
          echo "=== miniupnpc ==="
          cd temp
          tar xvfz ../../../download/miniupnpc-2.2.8.tar.gz
          cd miniupnpc-2.2.8
          make -j $JOBS libminiupnpc.a
          INSTALLPREFIX=$PWD/../../libs/miniupnpc-2.2.8
          mkdir -p $INSTALLPREFIX/include/miniupnpc
          mkdir -p $INSTALLPREFIX/lib
          cp include/*.h $INSTALLPREFIX/include/miniupnpc/
          cp libminiupnpc.a $INSTALLPREFIX/lib/
          cd ../..

          # ── OpenSSL 1.1.1w ────────────────────────────────────────────────────
          # Args: $1=platform  $2=make_jobs
          # Linux uses "linux-x86_64" not "mingw64"
          echo "=== OpenSSL ==="
          ../../compile/openssl.sh "linux-x86_64" "-j $JOBS"

          # ── qrencode 4.1.1 ────────────────────────────────────────────────────
          # Args: $1=configure_extra  $2=make_jobs
          echo "=== qrencode ==="
          ../../compile/qrencode.sh "" "-j $JOBS"

          # ── secp256k1 ─────────────────────────────────────────────────────────
          # Bundled in DigitalNote-2/src/secp256k1/
          # Args: $1=configure_extra  $2=make_jobs
          echo "=== secp256k1 ==="
          ../../compile/secp256k1.sh "" "-j $JOBS"

          # ── LevelDB ───────────────────────────────────────────────────────────
          # Bundled in DigitalNote-2/src/leveldb/
          # Args: $1=make_jobs
          echo "=== LevelDB ==="
          ../../compile/leveldb.sh "-j $JOBS"

          # ── BIP39-Mnemonic ────────────────────────────────────────────────────
          # Git submodule in DigitalNote-2/src/bip39/
          # Uses cmake internally
          # Args: $1=unused  $2=make_jobs
          echo "=== BIP39-Mnemonic ==="
          ../../compile/mnemonic.sh "" "-j $JOBS"

          echo "=== All libraries built ==="

      # ── 7. Build Qt wallet app ────────────────────────────────────────────────
      # Matches linux compile_app.sh + adds USE_BIP39=1
      - name: Build DigitalNote Qt wallet (app)
        working-directory: ${{ env.HOME }}/build/DigitalNote-Builder/linux/x64
        run: |
          export PATH="$PWD/libs/qt-5.15.7/bin:$PATH"
          cd DigitalNote-2

          rm -rf build Makefile

          echo "=== qmake (app) ==="
          qmake DigitalNote.app.pro \
            USE_UPNP=1 \
            USE_DBUS=1 \
            USE_QRCODE=1 \
            USE_BUILD_INFO=1 \
            USE_BIP39=1 \
            RELEASE=1 \
            2>&1 | tee $HOME/build/qmake-app.log

          echo "=== make (app) ==="
          make -j $(nproc) 2>&1 | tee $HOME/build/build-app.log
          exit ${PIPESTATUS[0]}

      # ── 8. Build daemon ───────────────────────────────────────────────────────
      # Matches linux compile_deamon.sh exactly (already has USE_BIP39=1)
      - name: Build DigitalNote daemon
        working-directory: ${{ env.HOME }}/build/DigitalNote-Builder/linux/x64
        run: |
          export PATH="$PWD/libs/qt-5.15.7/bin:$PATH"
          cd DigitalNote-2

          rm -rf build Makefile

          echo "=== qmake (daemon) ==="
          qmake DigitalNote.daemon.pro \
            USE_UPNP=1 \
            USE_BUILD_INFO=1 \
            USE_BIP39=1 \
            RELEASE=1 \
            2>&1 | tee $HOME/build/qmake-daemon.log

          echo "=== make (daemon) ==="
          make -j $(nproc) 2>&1 | tee $HOME/build/build-daemon.log
          exit ${PIPESTATUS[0]}

      # ── 9. Warning analysis ───────────────────────────────────────────────────
      - name: Analyse build warnings
        if: always()
        run: |
          APP_LOG=$HOME/build/build-app.log
          DAEMON_LOG=$HOME/build/build-daemon.log

          summarise() {
            local label=$1
            local log=$2
            if [ ! -f "$log" ]; then echo "  (no log found)"; return; fi
            local w e
            w=$(grep -c ": warning:" "$log" 2>/dev/null || echo 0)
            e=$(grep -c ": error:"   "$log" 2>/dev/null || echo 0)
            echo "  $w warning(s), $e error(s)"
            if [ "$w" -gt 0 ]; then
              echo ""
              echo "  Top warnings by frequency:"
              grep ": warning:" "$log" \
                | sed 's|.*: warning:||' \
                | sort | uniq -c | sort -rn \
                | head -30 \
                | awk '{printf "    %4dx  %s\n", $1, substr($0, index($0,$2))}'
            fi
          }

          echo "========================================"
          echo " APP BUILD SUMMARY"
          echo "========================================"
          summarise "App" "$APP_LOG"

          echo ""
          echo "========================================"
          echo " DAEMON BUILD SUMMARY"
          echo "========================================"
          summarise "Daemon" "$DAEMON_LOG"

          {
            printf "DigitalNote-2 Linux x64 Build Warning Report\n"
            printf "Ref:    %s\n" "$GITHUB_REF"
            printf "Commit: %s\n" "$GITHUB_SHA"
            printf "Date:   %s\n\n" "$(date -u)"

            printf "=== APP WARNINGS (by frequency) ===\n"
            [ -f "$APP_LOG" ] \
              && grep ": warning:" "$APP_LOG" \
                | sed 's|.*: warning:||' \
                | sort | uniq -c | sort -rn \
              || printf "(none)\n"

            printf "\n=== DAEMON WARNINGS (by frequency) ===\n"
            [ -f "$DAEMON_LOG" ] \
              && grep ": warning:" "$DAEMON_LOG" \
                | sed 's|.*: warning:||' \
                | sort | uniq -c | sort -rn \
              || printf "(none)\n"

            printf "\n=== FULL APP WARNING LINES ===\n"
            [ -f "$APP_LOG" ] \
              && grep ": warning:" "$APP_LOG" \
              || printf "(none)\n"

            printf "\n=== FULL DAEMON WARNING LINES ===\n"
            [ -f "$DAEMON_LOG" ] \
              && grep ": warning:" "$DAEMON_LOG" \
              || printf "(none)\n"

          } > $HOME/build/warning-report.txt

      # ── 10. Collect and upload ────────────────────────────────────────────────
      - name: Collect binaries and logs
        if: always()
        run: |
          out=$HOME/build/artifacts
          src=$HOME/build/DigitalNote-Builder/linux/x64/DigitalNote-2

          app=$(find "$src" -name "DigitalNote-qt" -type f 2>/dev/null | head -1)
          [ -n "$app" ] && cp "$app" "$out/DigitalNote-qt" && echo "App: $app" || echo "WARNING: App binary not found"

          dmn=$(find "$src" -name "DigitalNoted" -type f 2>/dev/null | head -1)
          [ -n "$dmn" ] && cp "$dmn" "$out/DigitalNoted" && echo "Daemon: $dmn" || echo "WARNING: Daemon not found"

          for f in build-app.log build-daemon.log qmake-app.log qmake-daemon.log warning-report.txt; do
            [ -f "$HOME/build/$f" ] && cp "$HOME/build/$f" "$out/$f"
          done

          ls -lh "$out/"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digitalnote-linux-x64-${{ github.sha }}
          path: ${{ env.HOME }}/build/artifacts/
          retention-days: 30

      - name: Upload warning report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: warning-report-linux-${{ github.sha }}
          path: ${{ env.HOME }}/build/warning-report.txt
          retention-days: 90
